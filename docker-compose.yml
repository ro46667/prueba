services:
  db:
    image: mysql:8.0
    container_name: mundial_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "12345"
      MYSQL_DATABASE:      "worldcup"
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-u","root","-p12345"]
      interval: 10s
      timeout:  5s
      retries:  5

  api:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: mundial_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:          "3000"
      DB_HOST:       "db"
      DB_PORT:       "3306"
      DB_USER:       "root"
      DB_PASSWORD:   "12345"
      DB_NAME:       "worldcup"
      DB_POOL_LIMIT: "10"
    ports:
      - "3000:3000"

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: mundial_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  db_data:
    driver: local
